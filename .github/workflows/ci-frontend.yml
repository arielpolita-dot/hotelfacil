name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: cd frontend && pnpm install

      - name: Build
        run: cd frontend && pnpm build
        env:
          VITE_FIREBASE_API_KEY: test
          VITE_FIREBASE_AUTH_DOMAIN: test
          VITE_FIREBASE_PROJECT_ID: test
          VITE_FIREBASE_STORAGE_BUCKET: test
          VITE_FIREBASE_MESSAGING_SENDER_ID: test
          VITE_FIREBASE_APP_ID: test
          VITE_FIREBASE_MEASUREMENT_ID: test
          VITE_API_URL: http://localhost:8000
          VITE_USE_API: 'false'

      - name: Test
        run: cd frontend && npx vitest run
