services:
  postgres:
    image: postgres:17-alpine
    container_name: hotelfacil-postgres
    environment:
      POSTGRES_DB: hotelfacil
      POSTGRES_USER: hotelfacil
      POSTGRES_PASSWORD: hotelfacil_dev_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelfacil"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotelfacil-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
